name: Release
on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Build
        run: |
          go build -ldflags="-s -w" -o gotomux .
          go build -ldflags="-s -w" -o gotomuxd ./cmd/gotomuxd/

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            gotomux
            gotomuxd

  aur:
    if: github.repository == 'fm39hz/gotomux'
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Stamp version into PKGBUILD
        run: |
          tagver="${GITHUB_REF_NAME#v}"
          sed -i "s/^pkgver=.*/pkgver=${tagver}  # set by CI/" dist/PKGBUILD-aur

      - name: Push to AUR
        uses: KSXGitHub/github-actions-deploy-aur@v3
        with:
          pkgname: gotomux
          pkgbuild: dist/PKGBUILD-aur
          test: true
          test_flags: --clean --cleanbuild --syncdeps --noconfirm --needed
          commit_username: ${{ secrets.AUR_USERNAME }}
          commit_email: ${{ secrets.AUR_EMAIL }}
          ssh_private_key: ${{ secrets.AUR_SSH_KEY }}
